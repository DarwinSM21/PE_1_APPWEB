<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Usuarios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="contenedor-principal">
        <h1 class="titulo">Buscador de Usuarios</h1>

        <div class="caja-busqueda">
        <input
            type="text"
            id="campo-nombre"
            class="campo-texto"
            placeholder="Escribe un nombre..."
        />
        <button id="boton-buscar" class="boton">Buscar</button>
        </div>

        <p id="mensaje-estado" class="mensaje-estado"></p>
        <div id="contenedor-tarjetas" class="contenedor-tarjetas"></div>
        <div id="lista-usuarios" class="lista-usuarios"></div>

        <script src="app.js"></script>
    </div>
</body>

</html>
