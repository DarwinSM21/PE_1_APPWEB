<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Usuarios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="contenedor-principal">

        <h1 class="titulo">Buscador de Usuarios</h1>

        <div class="caja-busqueda">

            <label for="campo-nombre" class="sr-only">
                Buscar usuario por nombre
            </label>

            <input
                type="text"
                id="campo-nombre"
                class="campo-texto"
                placeholder="Escribe un nombre..."
                aria-label="Buscar usuario por nombre"
            />

            <button id="boton-buscar" class="boton">
                Buscar
            </button>

        </div>

        <button
            id="boton-refrescar"
            class="boton boton_refresh"
            onclick="refrescarBusqueda()">
            Refrescar
        </button>

        <button
            id="boton-generar"
            class="boton boton_generar"
            onclick="generarNuevosUsuarios()">
            Generar nuevos usuarios
        </button>

        <p
            id="mensaje-estado"
            class="mensaje-estado"
            aria-live="polite">
        </p>

        <section
            id="contenedor-tarjetas"
            class="contenedor-tarjetas"
            aria-label="Tarjetas de usuarios">
        </section>

        <section
            id="lista-usuarios"
            class="lista-usuarios"
            aria-label="Lista de usuarios">
        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
